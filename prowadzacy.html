<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wartości Lidera — Prowadzący</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/peerjs/1.5.4/peerjs.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
:root{--gold:#C5A55A;--navy:#1B2A4A;--bg:#0F1923;--card:#1A2736;--card2:#1F2F42;--text:#E8E0D0;--muted:#8A9BB0;--border:rgba(197,165,90,0.2);--red:#CD5C5C;--teal:#2E8B8B;--heat:#E8820C}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
.hidden{display:none!important}
.top-nav{position:fixed;top:0;left:0;right:0;z-index:500;background:rgba(15,25,35,.95);backdrop-filter:blur(10px);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;height:52px;gap:4px}
.top-nav .nav-brand{color:var(--gold);font-weight:800;font-size:.85rem;margin-right:16px;white-space:nowrap}
.nav-btn{background:transparent;border:none;color:var(--muted);font-size:.82rem;font-weight:600;padding:8px 16px;cursor:pointer;border-radius:8px;transition:all .15s;white-space:nowrap}
.nav-btn:hover{color:var(--text);background:var(--card)}
.nav-btn.active{color:var(--gold);background:rgba(197,165,90,.1)}
.p-screen{min-height:100vh;padding:68px 20px 20px;display:flex;flex-direction:column}
.p-screen.fullscreen{padding-top:52px}
#startScreen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:20px}
#startScreen h1{font-size:2.8rem;color:var(--gold);font-weight:800;margin-bottom:8px;letter-spacing:-1px}
#startScreen .subtitle{font-size:1.1rem;color:var(--muted);margin-bottom:40px}
#startScreen .badge{display:inline-block;background:rgba(197,165,90,.12);color:var(--gold);font-size:.75rem;padding:4px 14px;border-radius:20px;border:1px solid var(--border);margin-bottom:32px}
.big-btn{background:linear-gradient(135deg,var(--gold),#A08940);color:var(--navy);border:none;padding:18px 48px;font-size:1.15rem;font-weight:700;border-radius:14px;cursor:pointer;transition:all .25s}
.big-btn:hover{transform:translateY(-3px);box-shadow:0 8px 30px rgba(197,165,90,.35)}
.big-btn:disabled{opacity:.35;cursor:not-allowed;transform:none!important;box-shadow:none!important}
.secondary-btn{background:var(--card2);color:var(--muted);border:1px solid var(--border);padding:10px 20px;font-size:.85rem;font-weight:600;border-radius:10px;cursor:pointer;transition:all .2s}
.secondary-btn:hover{border-color:var(--gold);color:var(--gold)}
.danger-btn{background:rgba(205,92,92,.15);color:var(--red);border:1px solid rgba(205,92,92,.3);padding:14px 32px;font-size:1rem;font-weight:700;border-radius:12px;cursor:pointer;transition:all .2s}
.danger-btn:hover{background:rgba(205,92,92,.25)}
.danger-btn:disabled{opacity:.35;cursor:not-allowed}
.name-input{background:var(--card);border:2px solid var(--border);border-radius:12px;padding:14px 18px;font-size:1.1rem;color:var(--text);width:100%;max-width:320px;text-align:center;outline:none}
.name-input:focus{border-color:var(--gold)}.name-input::placeholder{color:var(--muted)}
.name-input.error{border-color:var(--red);animation:shake .4s}
.validation-msg{color:var(--red);font-size:.8rem;margin-top:8px;min-height:1.2em}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
#canvasPage{padding:0;position:relative;overflow:hidden;padding-top:52px}
#valuesField{width:100vw;height:calc(100vh - 52px);position:relative;overflow:hidden}
.scattered-word{position:absolute;font-size:1.15rem;font-weight:600;white-space:nowrap;pointer-events:none;text-shadow:0 2px 8px rgba(0,0,0,.5)}
.heatmap-wrap{width:100%;max-width:750px;margin:0 auto;position:relative}
.heatmap-wrap svg{width:100%;height:auto}
.svg-tooltip{position:absolute;background:var(--card);border:1px solid var(--gold);border-radius:10px;padding:12px 16px;pointer-events:none;overflow-y:auto;max-height:400px;opacity:0;transition:opacity .2s;z-index:50;min-width:180px;max-width:260px}
.svg-tooltip .tt-cat{font-size:.9rem;font-weight:700;margin-bottom:4px}
.svg-tooltip .tt-dim{font-size:.72rem;color:var(--muted);margin-bottom:6px}
.svg-tooltip .tt-values{font-size:.78rem;color:var(--text);line-height:1.5}
.svg-tooltip .tt-count{font-size:1.3rem;font-weight:800;color:var(--gold);margin-top:4px}
.page-title{font-size:1.5rem;color:var(--gold);text-align:center;margin-bottom:4px}
.page-sub{font-size:.9rem;color:var(--muted);text-align:center;margin-bottom:16px}
/* Dashboard */
.dash-filters{display:flex;align-items:center;gap:16px;justify-content:center;margin-bottom:16px;flex-wrap:wrap}
.dash-filters label{font-size:.85rem;color:var(--muted);font-weight:600}
.dash-filters input[type=range]{width:180px;accent-color:var(--gold)}
.dash-filters .slider-val{font-size:1.6rem;font-weight:900;color:var(--gold);min-width:36px;text-align:center}
.dim-filter{display:flex;gap:6px;flex-wrap:wrap}
.dim-chip{padding:5px 12px;border-radius:20px;font-size:.75rem;font-weight:600;cursor:pointer;border:1px solid var(--border);transition:all .15s;user-select:none}
.dim-chip.on{border-color:var(--gold);color:var(--gold);background:rgba(197,165,90,.12)}
.dim-chip.off{color:var(--muted);opacity:.5}
.dash-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;width:100%;max-width:1200px;margin:0 auto}
.dash-card{background:var(--card);border-radius:14px;padding:20px;border:1px solid var(--border);cursor:pointer;transition:all .25s;position:relative}
.dash-card:hover{border-color:var(--gold);transform:translateY(-2px)}
.dash-card h3{font-size:.95rem;color:var(--gold);margin-bottom:12px;text-align:center}
.dash-card.fullcard{grid-column:1/-1}
.dash-card.expanded{position:fixed;top:52px;left:0;right:0;bottom:0;z-index:200;border-radius:0;overflow-y:auto;cursor:default;transform:none;padding:20px}
.dash-back{display:none;position:absolute;top:12px;left:12px;z-index:210}
.dash-card.expanded .dash-back{display:block}
.ring-small .heatmap-wrap{max-width:680px}
.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.bar-label{font-size:.75rem;color:var(--text);width:140px;text-align:right;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bar-track{flex:1;height:22px;background:var(--card2);border-radius:6px;overflow:hidden}
.bar-fill{height:100%;border-radius:6px;transition:width .5s;display:flex;align-items:center;justify-content:flex-end;padding-right:6px;font-size:.7rem;font-weight:700;color:#fff;min-width:28px}
/* Admin */
.admin-tabs{display:flex;gap:4px;margin-bottom:20px;flex-wrap:wrap}
.admin-tab{background:var(--card);border:1px solid var(--border);color:var(--muted);padding:8px 18px;font-size:.82rem;font-weight:600;border-radius:8px;cursor:pointer;transition:all .15s}
.admin-tab:hover{color:var(--text)}
.admin-tab.active{background:rgba(197,165,90,.12);color:var(--gold);border-color:var(--gold)}
.admin-section{display:none}
.admin-section.active{display:block}
#adminQR{text-align:center}
#adminQR h3{font-size:1.3rem;color:var(--gold);margin-bottom:8px}
#qrBox{display:inline-block;padding:16px;background:#fff;border-radius:16px;margin:16px 0}
.room-code{font-size:3rem;font-weight:900;color:var(--gold);letter-spacing:6px;font-family:'Courier New',monospace}
.people-table{width:100%;border-collapse:collapse;font-size:.85rem}
.people-table th{text-align:left;color:var(--gold);padding:8px 12px;border-bottom:2px solid var(--border);font-size:.75rem;text-transform:uppercase;letter-spacing:1px}
.people-table td{padding:8px 12px;border-bottom:1px solid var(--border);vertical-align:middle}
.phase-badge{display:inline-block;padding:3px 10px;border-radius:12px;font-size:.72rem;font-weight:600}
.phase-badge.s{background:rgba(46,139,139,.2);color:var(--teal)}
.phase-badge.r{background:rgba(197,165,90,.15);color:var(--gold)}
.phase-badge.t{background:rgba(155,89,182,.15);color:#9B59B6}
.tbl-btn{background:none;border:none;cursor:pointer;font-size:.85rem;padding:4px 8px;border-radius:6px;transition:background .15s}
.tbl-btn.del{color:var(--red)}.tbl-btn.del:hover{background:rgba(205,92,92,.15)}
.tbl-btn.edit{color:var(--teal)}.tbl-btn.edit:hover{background:rgba(46,139,139,.15)}
.team-select{background:var(--card);border:1px solid var(--border);color:var(--text);padding:4px 8px;border-radius:6px;font-size:.78rem}
.config-row{display:flex;align-items:center;gap:16px;padding:16px 0;border-bottom:1px solid var(--border)}
.config-row label{font-size:.9rem;flex:1;cursor:pointer;color:var(--text)}
.config-row input[type=number]{background:var(--card);border:2px solid var(--border);border-radius:10px;padding:10px 14px;font-size:1rem;color:var(--gold);font-weight:700;width:72px;text-align:center;outline:none;-moz-appearance:textfield}
.config-row input[type=number]:focus{border-color:var(--gold)}
.config-row input[type=number]::-webkit-inner-spin-button,.config-row input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;margin:0}
.toggle-switch{position:relative;width:52px;height:28px;flex-shrink:0}
.toggle-switch input{opacity:0;width:0;height:0}
.toggle-slider{position:absolute;cursor:pointer;top:0;left:0;right:0;bottom:0;background:var(--card2);border:2px solid var(--border);border-radius:28px;transition:all .25s}
.toggle-slider:before{content:'';position:absolute;height:20px;width:20px;left:2px;bottom:2px;background:var(--muted);border-radius:50%;transition:all .25s}
.toggle-switch input:checked+.toggle-slider{background:rgba(197,165,90,.2);border-color:var(--gold)}
.toggle-switch input:checked+.toggle-slider:before{transform:translateX(24px);background:var(--gold)}
.teams-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.team-card{background:var(--card);border-radius:14px;padding:20px;border:1px solid var(--border);cursor:pointer;transition:all .2s}
.team-card:hover{border-color:var(--gold)}
.team-card h4{color:var(--gold);font-size:1rem;margin-bottom:4px}
.team-card .team-desc{font-size:.78rem;color:var(--muted);margin-bottom:12px}
.team-members{font-size:.82rem}
.team-members div{padding:4px 0;border-bottom:1px solid var(--border)}
.stat-card{background:var(--card);border-radius:10px;padding:12px 20px;text-align:center;border:1px solid var(--border);min-width:110px;display:inline-block;margin:6px}
.stat-num{font-size:1.8rem;font-weight:800;color:var(--gold)}
.stat-label{font-size:.72rem;color:var(--muted);margin-top:2px}
.reduction-panel{background:var(--card);border-radius:16px;padding:24px;max-width:500px;margin:20px auto;text-align:center;border:1px solid var(--border)}
.reduction-panel .current-count{font-size:3.5rem;font-weight:900;color:var(--gold);margin:10px 0}
/* Team detail (admin + student) */
.team-detail-tabs{display:flex;gap:4px;margin-bottom:16px;flex-wrap:wrap}
.team-detail-tab{background:var(--card);border:1px solid var(--border);color:var(--muted);padding:6px 14px;font-size:.78rem;font-weight:600;border-radius:8px;cursor:pointer}
.team-detail-tab.active{background:rgba(197,165,90,.12);color:var(--gold);border-color:var(--gold)}
.bio-text{font-size:.88rem;line-height:1.7;color:var(--text);max-width:750px;margin:0 auto}
.bio-text h3{color:var(--gold);margin:16px 0 8px}
/* Student screens */
.student-screen{min-height:100vh;min-height:100dvh;padding:16px;display:flex;flex-direction:column}
.student-header{text-align:center;padding:16px 0 12px;border-bottom:2px solid var(--gold);margin-bottom:16px}
.student-header h1{font-size:1.3rem;color:var(--gold);font-weight:700}
.student-header .step-info{font-size:.78rem;color:var(--muted);margin-top:4px}
.student-progress{height:5px;background:var(--card2);border-radius:3px;margin-bottom:16px;overflow:hidden}
.student-progress-fill{height:100%;background:linear-gradient(90deg,var(--teal),var(--gold));border-radius:3px;transition:width .4s}
#studentNameScreen{justify-content:center;align-items:center;text-align:center}
.selection-instruction{text-align:center;margin-bottom:12px}
.selection-instruction h2{font-size:1.1rem;color:var(--text);margin-bottom:4px}
.selection-instruction p{font-size:.82rem;color:var(--muted)}
.selection-counter{text-align:center;font-size:1.4rem;font-weight:800;color:var(--gold);margin-bottom:12px}
.values-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;flex:1;overflow-y:auto;padding-bottom:80px;align-content:start}
.value-card{background:var(--card);border:2px solid var(--border);border-radius:10px;padding:10px 12px;cursor:pointer;transition:all .15s;-webkit-tap-highlight-color:transparent;display:flex;align-items:center;gap:8px;min-height:48px}
.value-card:active{transform:scale(.97)}
.value-card.selected{border-color:var(--gold);background:rgba(197,165,90,.12)}
.value-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.value-label{font-size:.8rem;line-height:1.3}
.value-card.selected .value-label{color:var(--gold);font-weight:600}
.bottom-bar{position:fixed;bottom:0;left:0;right:0;background:var(--bg);border-top:1px solid var(--border);padding:12px 16px;z-index:100;display:flex;gap:10px}
.bottom-bar .big-btn{flex:1;padding:14px;font-size:.95rem;text-align:center}
.rank-instruction{text-align:center;margin-bottom:12px}
.rank-instruction h2{font-size:1.05rem;color:var(--text);margin-bottom:4px}
.rank-instruction p{font-size:.8rem;color:var(--muted)}
.rank-status{text-align:center;padding:8px;font-size:.8rem;color:var(--teal);font-weight:600;margin-bottom:8px}
.rank-list{display:flex;flex-direction:column;gap:6px;flex:1;padding-bottom:20px;overflow-y:auto}
.rank-item{background:var(--card);border:2px solid var(--border);border-radius:12px;padding:14px 12px;display:flex;align-items:center;gap:12px;cursor:grab;-webkit-tap-highlight-color:transparent;transition:transform .15s,box-shadow .15s,opacity .4s,max-height .4s;touch-action:none;user-select:none;max-height:80px;overflow:hidden}
.rank-item.dragging{opacity:.4;transform:scale(.95)}
.rank-item.drag-over{border-color:var(--gold);box-shadow:0 0 0 2px rgba(197,165,90,.3)}
.rank-item.cut{opacity:.15;max-height:0;padding:0 12px;margin:0;border-color:var(--red);pointer-events:none}
.rank-num{font-size:1.3rem;font-weight:900;color:var(--gold);width:28px;text-align:center;flex-shrink:0}
.rank-handle{color:var(--muted);font-size:1.1rem;flex-shrink:0}
.rank-name{font-size:.95rem;font-weight:600;flex:1}
.rank-cat{font-size:.7rem;color:var(--muted)}
.team-choose{text-align:center;padding:24px;margin-top:16px;background:var(--card);border-radius:14px;border:1px solid var(--border)}
.team-choose h3{color:var(--gold);margin-bottom:12px;font-size:1.1rem}
.team-choose p{font-size:.82rem;color:var(--muted);margin-bottom:16px}
.team-btn{background:var(--card2);border:2px solid var(--border);color:var(--text);padding:14px;border-radius:10px;cursor:pointer;transition:all .15s;text-align:left;font-size:.9rem;margin-bottom:8px}
.team-btn:hover{border-color:var(--gold)}
.team-btn.joined{border-color:var(--gold);background:rgba(197,165,90,.12)}
.team-btn .tb-name{font-weight:700;color:var(--gold)}
.team-btn .tb-desc{font-size:.75rem;color:var(--muted);margin-top:2px}
.student-mobile-nav{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:2px solid var(--gold);margin-bottom:16px}
.student-mobile-nav h2{font-size:1.1rem;color:var(--gold)}
.hamburger{background:none;border:none;color:var(--gold);font-size:1.5rem;cursor:pointer;padding:4px 8px}
.mobile-menu{display:none;flex-direction:column;gap:4px;padding:0 16px 12px}
.mobile-menu.open{display:flex}
.mobile-menu button{background:var(--card);border:1px solid var(--border);color:var(--muted);padding:10px;border-radius:8px;font-size:.85rem;font-weight:600;cursor:pointer;text-align:left}
.mobile-menu button.active{color:var(--gold);border-color:var(--gold)}
.result-card{background:var(--card);border-radius:16px;padding:24px;text-align:center;border:2px solid var(--gold);max-width:400px;width:100%;margin:0 auto}
.result-card h2{font-size:1.3rem;color:var(--gold);margin-bottom:16px}
.result-value{display:flex;align-items:center;gap:10px;padding:12px;background:var(--card2);border-radius:10px;margin-bottom:8px;text-align:left;animation:fadeIn .5s ease both}
.result-rank{font-size:1.4rem;font-weight:900;color:var(--gold);width:30px;text-align:center}
.result-name{font-size:1rem;font-weight:700}
.result-cat{font-size:.72rem;color:var(--muted)}
@keyframes fadeIn{from{opacity:0;transform:translateY(15px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:600px){#startScreen h1{font-size:1.8rem}.room-code{font-size:2rem}.scattered-word{font-size:.95rem!important}.dash-grid{grid-template-columns:1fr}.teams-grid{grid-template-columns:1fr}}
/* Leader values exercise */
.lv-section{margin-bottom:24px}
.lv-section h3{color:var(--gold);font-size:1rem;margin-bottom:8px}
.lv-rank-item{background:var(--card);border:2px solid var(--border);border-radius:10px;padding:12px;display:flex;align-items:center;gap:12px;margin-bottom:6px;cursor:grab;user-select:none;touch-action:none}
.lv-rank-item.dragging{opacity:.4;transform:scale(.95)}.lv-rank-item.drag-over{border-color:var(--gold);box-shadow:0 0 0 2px rgba(197,165,90,.3)}
.lv-chip{display:inline-block;padding:6px 14px;border-radius:20px;font-size:.8rem;font-weight:600;cursor:pointer;border:1px solid var(--border);color:var(--muted);transition:all .15s;user-select:none}
.lv-chip.selected{border-color:var(--gold);color:var(--gold);background:rgba(197,165,90,.12)}
.student-desktop-nav{display:flex;align-items:center;gap:4px;padding:8px 16px;border-bottom:1px solid var(--border);margin-bottom:16px;flex-wrap:wrap}
.student-desktop-nav .nav-brand{color:var(--gold);font-weight:800;font-size:.85rem;margin-right:16px}
.student-desktop-nav .nav-btn{background:transparent;border:none;color:var(--muted);font-size:.8rem;font-weight:600;padding:6px 12px;cursor:pointer;border-radius:8px;transition:all .15s}
.student-desktop-nav .nav-btn:hover{color:var(--text);background:var(--card)}.student-desktop-nav .nav-btn.active{color:var(--gold);background:rgba(197,165,90,.1)}
.tt-vhelp{display:inline-block;width:16px;height:16px;line-height:16px;text-align:center;border-radius:50%;background:var(--card2);color:var(--muted);font-size:.65rem;cursor:pointer;vertical-align:middle;margin-left:4px}
.tt-vdesc{display:none;font-size:.72rem;color:var(--muted);padding:2px 0 4px;line-height:1.4}
.tt-cdesc{font-size:.75rem;color:var(--muted);margin-bottom:8px;line-height:1.4;font-style:italic}
/* Password gate */
#passwordGate{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:20px}
#passwordGate .gate-card{background:var(--card);border:2px solid var(--border);border-radius:20px;padding:40px 32px;max-width:400px;width:100%}
#passwordGate h1{font-size:2rem;color:var(--gold);font-weight:800;margin-bottom:8px}
#passwordGate .gate-sub{font-size:.9rem;color:var(--muted);margin-bottom:28px}
#passwordGate .gate-icon{font-size:3rem;margin-bottom:16px}
</style>
</head>
<body>

<!-- PASSWORD GATE -->
<div id="passwordGate">
  <div class="gate-card">
    <div class="gate-icon">🔐</div>
    <h1>Wartości Lidera</h1>
    <p class="gate-sub">Panel prowadzącego — wymagane hasło</p>
    <input type="password" id="gatePassword" class="name-input" placeholder="Hasło" style="max-width:280px" autocomplete="off">
    <div class="validation-msg" id="gateError"></div>
    <button class="big-btn" style="margin-top:16px;width:100%;max-width:280px" onclick="verifyPassword()">Wejdź →</button>
  </div>
</div>

<!-- PRESENTER NAV -->
<nav id="topNav" class="top-nav hidden">
  <span class="nav-brand">Wartości Lidera</span>
  <button class="nav-btn" data-page="canvasPage" onclick="APP.nav('canvasPage')">Canvas</button>
  <button class="nav-btn" data-page="livePage" onclick="APP.nav('livePage')">Wartości na żywo</button>
  <button class="nav-btn" data-page="dashPage" onclick="APP.nav('dashPage')">Dashboard</button>
  <button class="nav-btn" data-page="adminPage" onclick="APP.nav('adminPage')">Panel Admina</button>
</nav>

<!-- PRESENTER PAGES -->
<div id="canvasPage" class="p-screen fullscreen hidden"><div id="valuesField"></div></div>
<div id="livePage" class="p-screen hidden"><div class="page-title">Mapa wartości grupy</div><div class="page-sub" id="liveSub"></div><div class="heatmap-wrap"><svg id="liveSvg" viewBox="-60 -60 720 720"></svg><div class="svg-tooltip" id="liveTT"></div></div></div>
<div id="dashPage" class="p-screen hidden">

var HASH='b38d86c738c217f1f4defd35387e1f79f272ec74e69ef2ed780cee6050f68f64';
function verifyPassword(){
  var pw=document.getElementById('gatePassword').value;
  var err=document.getElementById('gateError');
  if(!pw){err.textContent='Wpisz hasło';return;}
  crypto.subtle.digest('SHA-256',new TextEncoder().encode(pw)).then(function(buf){
    var hex=Array.from(new Uint8Array(buf)).map(function(b){return b.toString(16).padStart(2,'0');}).join('');
    if(hex===HASH){
      document.getElementById('passwordGate').style.display='none';
      APP.startPresenter();
    }else{
      err.textContent='Nieprawidłowe hasło';
      document.getElementById('gatePassword').classList.add('error');
      setTimeout(function(){document.getElementById('gatePassword').classList.remove('error');},500);
    }
  });
}
document.addEventListener('DOMContentLoaded',function(){
  document.getElementById('gatePassword').addEventListener('keydown',function(e){if(e.key==='Enter')verifyPassword();});
});

  for(var pi=0;pi<pids.length;pi++){var sd=S.studentData[pids[pi]];if(!sd)continue;var vs=sd.ranked?sd.ranked.slice(0,lim):(sd.top10?sd.top10.slice(0,lim):[]);for(var i=0;i<vs.length;i++)vc[vs[i]]=(vc[vs[i]]||0)+1;}
  var cc={};for(var ck in CATS){var cv=VALUES.filter(function(v){return v.cat===ck;});var c=0;for(var j=0;j<cv.length;j++)c+=(vc[cv[j].id]||0);cc[ck]=c;}cc._vc=vc;return cc;
}

function initPeer(){
  var pid='val-'+S.roomCode.toLowerCase();S.peer=new Peer(pid);
  S.peer.on('connection',function(conn){S.connections.push(conn);conn.on('open',function(){conn.send({type:'setLimit',limit:S.currentLimit});if(S.teamsEnabled)conn.send({type:'teamsOn',teams:TEAMS.map(function(t){return{id:t.id,name:t.name,desc:t.desc};})});});conn.on('data',function(d){onSMsg(conn.peer,d);});conn.on('close',function(){S.connections=S.connections.filter(function(c){return c.peer!==conn.peer;});upAll();});upAll();});

function onSMsg(pid,d){
  if(d.type==='join'){var reqName=String(d.name||'').trim();for(var p2 in S.studentData){if(p2!==pid&&S.studentData[p2].name&&S.studentData[p2].name.toLowerCase()===reqName.toLowerCase()){sendTo(pid,{type:'nameError',msg:'To imię jest już zajęte.'});return;}}}
  if(!S.studentData[pid])S.studentData[pid]={connId:pid};var sd=S.studentData[pid];
  if(d.type==='join'){sd.name=String(d.name||'').trim();sd.phase='selecting';}
  else if(d.type==='top'){sd.top10=d.values;sd.phase='ranking';}
  else if(d.type==='ranked'){sd.ranked=d.values;sd.phase='waiting';}
  else if(d.type==='rerank'){sd.ranked=d.values;}
  else if(d.type==='team'){sd.team=d.team;sd.phase='teams';}
  else if(d.type==='leaderEx'){sd.leaderEx=d;}
  upAll();
}

// CANVAS
function buildCanvas(){
  var f=document.getElementById('valuesField');f.innerHTML='';var w=window.innerWidth,h=window.innerHeight-52;
  var sh=shuffle(VALUES);var cols=Math.ceil(Math.sqrt(sh.length*(w/h)));var rows=Math.ceil(sh.length/cols);var cW=w/cols,cH=h/rows;var items=[];
  for(var i=0;i<sh.length;i++){var v=sh[i];var col=i%cols,row=~~(i/cols);var x=cW*col+cW*(0.05+Math.random()*0.65);var y=cH*row+cH*(0.1+Math.random()*0.65);
    var span=document.createElement('span');span.className='scattered-word';span.textContent=v.pl;span.style.left=x+'px';span.style.top=y+'px';span.style.color=SC[~~(Math.random()*SC.length)];span.style.transform='rotate('+((Math.random()-0.5)*28)+'deg)';span.style.opacity=(0.7+Math.random()*0.3).toFixed(2);f.appendChild(span);
    items.push({el:span,x:x,y:y,dx:(Math.random()-0.5)*0.45,dy:(Math.random()-0.5)*0.35});}
  (function dr(){for(var i=0;i<items.length;i++){var t=items[i];t.x+=t.dx;t.y+=t.dy;if(t.x<10||t.x>w-120){t.dx*=-1;t.x=Math.max(10,Math.min(t.x,w-120));}if(t.y<10||t.y>h-30){t.dy*=-1;t.y=Math.max(10,Math.min(t.y,h-30));}t.el.style.left=t.x+'px';t.el.style.top=t.y+'px';}S.canvasRAF=requestAnimationFrame(dr);})();
}

// SVG RING
function buildRing(svgId,ttId,lim,filterPids){
  var svg=document.getElementById(svgId);if(!svg)return;svg.innerHTML='';var cx=300,cy=300,R=240,r2=80,n=CO.length,st=360/n;
  var defs=svgE('defs',{});svg.appendChild(defs);svg.appendChild(svgE('circle',{cx:cx,cy:cy,r:R+2,fill:'none',stroke:'rgba(255,255,255,0.08)','stroke-width':1}));
  var cc=getCounts(lim,filterPids);var maxC=1;for(var ck in CATS)if(cc[ck])maxC=Math.max(maxC,cc[ck]);
  var activeDims=filterPids?['openness','enhancement','conservation','transcendence']:S.dashDims;
  for(var i=0;i<n;i++){var sa=-90+i*st,ea=sa+st;var cat=CO[i];var catDim=CATS[cat].dim;var dimActive=activeDims.indexOf(catDim)>=0;
    var c=cc[cat]||0;var inten=dimActive?Math.min(c/Math.max(maxC,1),1):0;
    var el=svgE('path',{d:arcP(cx,cy,r2,R,sa,ea),fill:hR('#E8820C',dimActive?(0.04+inten*0.7):0.02),stroke:'rgba(255,255,255,'+(dimActive?'0.12':'0.04')+')','stroke-width':1.5,cursor:'pointer',opacity:dimActive?1:0.3});svg.appendChild(el);
    var ma=sa+st/2;var lr=R*0.78,lx=cx+lr*Math.cos(ma*Math.PI/180),ly=cy+lr*Math.sin(ma*Math.PI/180);
    var lb=svgE('text',{x:lx,y:ly,fill:'#fff','font-size':'11.5','font-weight':'700','text-anchor':'middle','dominant-baseline':'middle','pointer-events':'none',opacity:dimActive?1:0.2});lb.textContent=CATS[cat].pl;var rot=ma;if(rot>90&&rot<270)rot+=180;lb.setAttribute('transform','rotate('+rot+','+lx+','+ly+')');svg.appendChild(lb);
    var cr2=R*0.52,ccx2=cx+cr2*Math.cos(ma*Math.PI/180),ccy2=cy+cr2*Math.sin(ma*Math.PI/180);
    var cnt=svgE('text',{x:ccx2,y:ccy2,fill:'#fff','font-size':'24','font-weight':'900','text-anchor':'middle','dominant-baseline':'middle','pointer-events':'none',opacity:dimActive?'0.9':'0.15'});cnt.textContent=c>0?c:'';svg.appendChild(cnt);
    if(ttId)(function(ck2,seg2){seg2.addEventListener('mouseenter',function(e){showTT(e,ck2,lim,ttId,filterPids);});seg2.addEventListener('mouseleave',function(){document.getElementById(ttId).style.opacity='0';});})(cat,el);
  }
  var outerR=R+28;
  for(var di=0;di<DIM_ARCS.length;di++){var dd=DIM_ARCS[di];var fa=-90+dd.from*st,ta=-90+dd.to*st;
    var dimOn=activeDims?activeDims.indexOf(dd.dim)>=0:true;
    var label=DIMS[dd.dim].pl.toUpperCase();
    var arcR=outerR;var startA,endA,midA=(fa+ta)/2;
    var needFlip=(midA>90&&midA<270);
    if(needFlip){startA=ta;endA=fa;}else{startA=fa;endA=ta;}
    var pathId='dimArc_'+svgId+'_'+di;
    var sar=startA*Math.PI/180,ear=endA*Math.PI/180;
    var sx=cx+arcR*Math.cos(sar),sy=cy+arcR*Math.sin(sar);
    var ex=cx+arcR*Math.cos(ear),ey=cy+arcR*Math.sin(ear);

    var pd='M'+sx+','+sy+' A'+arcR+','+arcR+' 0 '+lg+' '+sweep+' '+ex+','+ey;
    var pathEl=svgE('path',{id:pathId,d:pd,fill:'none',stroke:'none'});
    if(!defs.parentNode){var df=svgE('defs',{});svg.insertBefore(df,svg.firstChild);defs=df;}
    defs.appendChild(pathEl);

    var tp=svgE('textPath',{});tp.setAttributeNS('http://www.w3.org/1999/xlink','xlink:href','#'+pathId);tp.setAttribute('startOffset','50%');tp.setAttribute('text-anchor','middle');
    tp.textContent=label;txt.appendChild(tp);svg.appendChild(txt);
  }
  svg.appendChild(svgE('circle',{cx:cx,cy:cy,r:r2-4,fill:'#0F1923',stroke:'rgba(255,255,255,0.1)','stroke-width':1}));

  var t2=svgE('text',{x:cx,y:cy+12,fill:'#8A9BB0','font-size':'11','text-anchor':'middle'});t2.textContent=pCount+' studentów';svg.appendChild(t2);

function buildDash(lim){
  takeSnap(lim);var grid=document.getElementById('dashGrid');grid.innerHTML='';var cc=getCounts(lim);var vc=cc._vc;var tot=Object.keys(S.studentData).length;
  document.getElementById('dashSub').textContent='Top '+lim+' \u2014 '+tot+' studentów';
  var c0=document.createElement('div');c0.className='dash-card fullcard ring-small';
  c0.innerHTML='<h3>Koło Schwartza</h3><div class="heatmap-wrap"><svg id="dashRingSvg" viewBox="-60 -60 720 720"></svg><div class="svg-tooltip" id="dashRingTT"></div></div>';
  var bk0=document.createElement('button');bk0.className='secondary-btn dash-back';bk0.textContent='\u2190 Wróć';bk0.addEventListener('click',function(ev){ev.stopPropagation();c0.classList.remove('expanded');});
  c0.insertBefore(bk0,c0.firstChild);
  c0.addEventListener('click',function(e){if(!c0.classList.contains('expanded')&&e.target.tagName!=='INPUT'&&e.target.tagName!=='BUTTON')c0.classList.add('expanded');});
  grid.appendChild(c0);
  setTimeout(function(){buildRing('dashRingSvg','dashRingTT',lim);},50);
  var activeCats={};for(var di=0;di<S.dashDims.length;di++){var cats=DIM_CATS[S.dashDims[di]];for(var ci=0;ci<cats.length;ci++)activeCats[cats[ci]]=true;}
  var fvc={};for(var vid in vc){var v=valById(parseInt(vid));if(v&&activeCats[v.cat])fvc[vid]=vc[vid];}
  var c1=mkCard('Top 10 wartości');var sorted=Object.keys(fvc).map(function(k){return{id:parseInt(k),c:fvc[k]};}).sort(function(a,b){return b.c-a.c;}).slice(0,10);
  var maxV=sorted.length?sorted[0].c:1;
  for(var si=0;si<sorted.length;si++){var sv=valById(sorted[si].id);c1.cnt.appendChild(mkBar(sv?sv.pl:'?',sorted[si].c,maxV,CATS[sv?sv.cat:'']?CATS[sv.cat].color:'#C5A55A'));}
  grid.appendChild(c1.el);
  var c2=mkCard('Ranking kategorii');var catArr=CO.filter(function(ck){return activeCats[ck];}).map(function(ck){return{key:ck,c:cc[ck]||0};}).sort(function(a,b){return b.c-a.c;});
  var maxCat=catArr.length?catArr[0].c:1;
  for(var j=0;j<catArr.length;j++)c2.cnt.appendChild(mkBar(CATS[catArr[j].key].pl,catArr[j].c,maxCat,CATS[catArr[j].key].color));
  grid.appendChild(c2.el);
  var c3=mkCard('Wymiary Schwartza');var dimArr=S.dashDims.map(function(dk){var s=0;DIM_CATS[dk].forEach(function(ck){s+=(cc[ck]||0);});return{key:dk,c:s};}).sort(function(a,b){return b.c-a.c;});
  var maxDim=dimArr.length?dimArr[0].c:1;var dCol={openness:'#E74C3C',enhancement:'#E67E22',conservation:'#2980B9',transcendence:'#9B59B6'};
  for(var dii=0;dii<dimArr.length;dii++)c3.cnt.appendChild(mkBar(DIMS[dimArr[dii].key].pl,dimArr[dii].c,maxDim,dCol[dimArr[dii].key]));
  grid.appendChild(c3.el);
}
function mkCard(title){
  var card=document.createElement('div');card.className='dash-card';
  var bk=document.createElement('button');bk.className='secondary-btn dash-back';bk.textContent='\u2190 Wróć';bk.addEventListener('click',function(ev){ev.stopPropagation();card.classList.remove('expanded');});
  var h=document.createElement('h3');h.textContent=title;var cnt=document.createElement('div');
  card.appendChild(bk);card.appendChild(h);card.appendChild(cnt);
  card.addEventListener('click',function(e){if(!card.classList.contains('expanded')&&e.target.tagName!=='BUTTON')card.classList.add('expanded');});
  return{el:card,cnt:cnt};
}
function mkBar(label,val,max,color){
  var r=document.createElement('div');r.className='bar-row';
  r.innerHTML='<div class="bar-label">'+label+'</div><div class="bar-track"><div class="bar-fill" style="width:'+Math.round(val/Math.max(max,1)*100)+'%;background:'+color+'">'+val+'</div></div>';return r;
}
